name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: go vet
        run: go vet ./...
      - name: go test
        run: go test ./...
      - name: build
        run: go build -o agilemarkdown .
      - name: end-to-end suite
        env:
          AM_BIN: ${{ github.workspace }}/agilemarkdown
        run: bash tests/e2e/run.sh
