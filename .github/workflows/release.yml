name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  ci:
    name: Verify (build + unit + E2E)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - run: go vet ./...
      - run: go test ./...
      - run: go build -o agilemarkdown .
      - name: end-to-end suite
        env:
          AM_BIN: ${{ github.workspace }}/agilemarkdown
        run: bash tests/e2e/run.sh

  release:
    name: Build matrix and publish
    needs: ci
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - { goos: linux,   goarch: amd64 }
          - { goos: linux,   goarch: arm64 }
          - { goos: darwin,  goarch: amd64 }
          - { goos: darwin,  goarch: arm64 }
          - { goos: windows, goarch: amd64 }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          BIN=agilemarkdown_${{ matrix.goos }}_${{ matrix.goarch }}
          [ "${{ matrix.goos }}" = "windows" ] && BIN="${BIN}.exe"
          REPO_VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p dist
          go build -trimpath -ldflags "-s -w -X main.version=${REPO_VERSION}" -o "dist/${BIN}" .
          (cd dist && shasum -a 256 "${BIN}" > "${BIN}.sha256")
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*
          generate_release_notes: true
          fail_on_unmatched_files: true
